<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Properties Profile Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/vivek_photo.jpeg">
</head>
<body>

    <div class="profile-card">
        <div class="image-container">
            <img src="images/vivek_photo.jpeg" alt="Profile Picture">
        </div>
        
        <h2 class="profile-name">Vivek</h2>
        <p class="profile-title">web dev</p>
        
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-number">24</span>
                <span class="stat-label">Projects</span>
            </div>
            <div class="stat-box">
                <span class="stat-number">12k</span>
                <span class="stat-label">Followers</span>
            </div>
        </div>

        <button class="action-btn">Follow User</button>
    </div>
</body>
</html>
